apiVersion: apps/v1
kind: Deployment
metadata: 
  name: java-calculator-deployment
spec: 
  replicas: 2
  selector:
    matchLabels:
      app: java-calculator
  template:
    metadata:
      labels:
        app: java-calculator
    spec:
      containers:
      - name: java-calculator
        # Updated to your correct Account ID and Region
        image: 197446684998.dkr.ecr.us-east-2.amazonaws.com/java-calculator-repo:latest
        ports:
          - containerPort: 9090
